server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-message: never       # Never expose raw error messages
    include-binding-errors: never

spring:
  application:
    name: MSV Name Service

  # ── Database ─────────────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:msv_invoice_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: InvoiceHikariPool
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      connection-timeout: 20000
      leak-detection-threshold: 60000

  # ── JPA ──────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC
        default_batch_fetch_size: 20

  # ── Flyway ───────────────────────────────────────────────────────
#  flyway:
#    enabled: true
#    locations: classpath:db/migration
#    baseline-on-migrate: true
#    validate-on-migrate: true

  # ── Jackson ──────────────────────────────────────────────────────
  jackson:
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

# ── Actuator ─────────────────────────────────────────────────────
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
  info:
    app:
      name: ${spring.application.name}
      version: "@project.version@"

# ── OpenAPI / Swagger ─────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
  default-produces-media-type: application/json

# ── App Custom Properties ─────────────────────────────────────────
app:
  name: MSV Name Service
  api:
    version: 1.0.1
    base-path: /api/v1
    description: REST API for Payment Services

# ── Logging ──────────────────────────────────────────────────────
logging:
  level:
    com.msv.invoiceservice: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"